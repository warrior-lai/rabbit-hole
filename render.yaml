services:
  - type: web
    name: rabbit-hole
    runtime: node
    buildCommand: "cd client && npm install --include=dev && npx vite build && cd ../server && npm install"
    startCommand: "cd server && npx tsx src/index.ts"
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      # Set the value in the Render dashboard (Environment tab). sync:false keeps the
      # secret out of the repo. Optional — if unset, debug reports are just disabled.
      - key: DISCORD_WEBHOOK_URL
        sync: false
