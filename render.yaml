services:
  - type: web
    name: rabbit-hole
    runtime: node
    buildCommand: "npm install && cd client && npm install && npx vite build && cd ../server && npm install"
    startCommand: "cd server && npx tsx src/index.ts"
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
